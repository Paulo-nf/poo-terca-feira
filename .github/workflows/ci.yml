# Esteira de CI do Arena PE (monorepo: frontend + websiteapi)
# Estágios: build-test -> package -> deploy-stg
# Roda a cada push e pull_request; o deploy só ocorre na branch principal (main).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancela execuções antigas do mesmo ref quando chega um novo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ───────────────────────────── ESTÁGIO 1: build + test ─────────────────────────────
  # Instala dependências, faz o build e roda os testes (unit + BDD) das duas aplicações.
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Backend (Spring Boot / Maven / Java 17) ----
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Backend — build + testes (unit + BDD)
        working-directory: websiteapi
        # ./mvnw test roda tanto os testes de domínio (JUnit) quanto o
        # CucumberIntegrationTest (BDD). verify garante o ciclo completo de build.
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Publicar relatórios de teste do backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: websiteapi/target/surefire-reports/
          if-no-files-found: ignore

      # ---- Frontend (Vite / React / TypeScript) ----
      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Frontend — testes (unit)
        working-directory: frontend
        run: npm test

      - name: Frontend — build
        working-directory: frontend
        run: npm run build

  # ───────────────────────────── ESTÁGIO 2: package ─────────────────────────────
  # Depende do build-test. Gera as imagens de container das duas aplicações.
  # Em PR apenas valida o build da imagem; em push faz login e publica no GHCR.
  package:
    name: Package (imagens de container)
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app:
          - { name: websiteapi, context: websiteapi }
          - { name: frontend, context: frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Só faz login/push quando NÃO é pull_request (push tem credenciais do repo).
      - name: Login no GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app.name }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (e push em não-PR)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────── ESTÁGIO 3: deploy-stg ─────────────────────────────
  # Depende do package. Só roda em push na branch principal (main).
  deploy-stg:
    name: Deploy (staging)
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Implantar no ambiente de staging
        # Placeholder: substitua pelo comando real de deploy do seu provedor
        # (ex.: kubectl set image / docker compose pull && up / fly deploy / etc.).
        run: |
          echo "Implantando imagens em staging a partir do commit ${GITHUB_SHA}..."
          echo "  - ${REGISTRY}/${IMAGE_PREFIX}/websiteapi:sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "  - ${REGISTRY}/${IMAGE_PREFIX}/frontend:sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "TODO: integrar com a infraestrutura de staging real."
