# Configuração do Nginx para servir o SPA do Arena PE.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Como o roteamento é client-side (state-based), todo caminho cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados pelo Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
